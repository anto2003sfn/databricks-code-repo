# This is a Databricks asset bundle definition for retail_etl_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: retail_etl_project
  uuid: 9b804f7a-62eb-43f6-830d-05df2c33bfa9

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-fe14ef4e-96da.cloud.databricks.com
    variables:
      catalog: retail
      schema: schema_retail
  prod:
    mode: production
    workspace:
      host: https://dbc-fe14ef4e-96da.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/anto2003.sfn@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/anto2003.sfn@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: retail
      schema: schema_retail
    permissions:
      - user_name: anto2003.sfn@gmail.com
        level: CAN_MANAGE
